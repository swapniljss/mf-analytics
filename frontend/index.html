<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mutual Fund Analytics</title>
    <script>
      // Set dark class BEFORE React mounts to prevent flash of light UI.
      // Dark is the DEFAULT — only flip to light if the user explicitly chose
      // it via the toggle (which writes "0" to localStorage). First-time
      // visitors land on dark.
      (function () {
        try {
          var stored = localStorage.getItem('mf:dark-mode');
          var dark = stored !== '0';
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          // private mode / disabled storage — default to dark
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
